name: Run Python Script

on:
  schedule:
  - cron: '0 5 * * *' # Run at Every day at 5AM UTC
  push:        # Run when code is pushed
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  run-python:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'  # Choose your Python version
      

      # Step 3: Install dependencies (if any)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      
      # Step 4: Create .env file From Github Secrets
      - name: Create .env file
        run: |
          echo "API_KEY=${{ secrets.API_KEY }}" >> .env
          echo "LISTEN_USER=${{ secrets.LISTEN_USER }}" >> .env
      
      # Step 5: Run the Python script
      - name: Run script
        run: |
          python csv_generate.py
          git config user.name github-actions
          git config user.email github-actions@github.com
          if ! git diff --quiet --cached; then
            git commit -m "crongenerated"
            git push
          else
            echo "No changes detected."
          fi
